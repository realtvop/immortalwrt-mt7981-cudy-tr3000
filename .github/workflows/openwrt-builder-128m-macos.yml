name: OpenWrt Builder 128M

on:
  repository_dispatch:
  workflow_dispatch:

# йҳІжӯўеӨҡдёӘжһ„е»әеҗҢж—¶иҝҗиЎҢ
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 6G
  REPO_URL: https://github.com/weekdaycare/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/128m.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: рҹҷҢ Checkout
        uses: actions/checkout@v4

      - name: рҹӣ пёҸ Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          brew unlink awk
          brew install coreutils diffutils findutils gawk gnu-getopt gnu-tar grep make ncurses pkg-config wget quilt xz python-psutil

          echo "вҸ° Setting timezone to $TZ"
          sudo systemsetup -settimezone "$TZ"

          echo "рҹ“Ғ Creating workdir"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

          echo "рҹ’ҫ Disk space after cleanup:"
          df -hT

      - name: рҹӘң Clone source code
        working-directory: /workdir
        run: |
          echo "рҹ“Ҙ Cloning $REPO_URL (branch: $REPO_BRANCH)"
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          echo "вң… Source code cloned successfully"

      - name: вҡҷпёҸ Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: рҹ§¬ Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: рҹӘӣ Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: рҹ§© Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: рҹ“қ Generate config hash for cache
        id: config-hash
        run: |
          cd openwrt
          make defconfig
          CONFIG_HASH=$(md5sum .config | awk '{print $1}')
          echo "hash=$CONFIG_HASH" >> $GITHUB_OUTPUT
          echo "рҹ“Ӣ Config hash: $CONFIG_HASH"

      - name: вҡҷпёҸ Setup ccache cache
        uses: actions/cache@v4
        with:
          path: /workdir/.ccache
          key: ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-${{ steps.config-hash.outputs.hash }}

      - name: вҡҷпёҸ Setup downloads cache
        uses: actions/cache@v4
        with:
          path: /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ steps.config-hash.outputs.hash }}

      - name: рҹ”§ Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache --set-config=compression_level=6
          ccache -z
          echo "вң… ccache configured with max size: $CCACHE_MAXSIZE"

      - name: рҹ•№пёҸ Download packages
        id: package
        run: |
          cd openwrt
          echo "рҹ“Ұ Downloading packages..."
          make download -j$(nproc)
          echo "рҹ”Қ Checking for failed downloads..."
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: рҹ”® Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo "рҹ”Ё Starting compilation with $(nproc) threads"
          echo "CCACHE_DIR: $CCACHE_DIR"

          # йҰ–е…Ҳе°қиҜ•еӨҡзәҝзЁӢзј–иҜ‘
          if make -j$(nproc) CC="ccache gcc" CXX="ccache g++"; then
            echo "вң… Multi-threaded compilation succeeded"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "вҡ пёҸ Multi-threaded compilation failed, retrying with single thread and verbose output..."
            make -j1 V=s
            if [ $? -eq 0 ]; then
              echo "вң… Single-threaded compilation succeeded"
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "вқҢ Compilation failed"
              echo "status=failure" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

          # жҳҫзӨә ccache з»ҹи®Ў
          echo "рҹ“Ҡ ccache statistics:"
          ccache -s

          # иҺ·еҸ–и®ҫеӨҮеҗҚз§°
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

          echo "рҹ“ұ Device: $(cat DEVICE_NAME 2>/dev/null || echo 'unknown')"
          echo "рҹ“… Build date: $(date +"%Y-%m-%d %H:%M:%S")"

      - name: рҹӣ пёҸ Check space usage
        if: (!cancelled())
        run: |
          echo "рҹ’ҫ Disk space usage:"
          df -hT
          echo ""
          echo "рҹ“Ҡ Build directory size:"
          du -sh /workdir/openwrt 2>/dev/null || echo "Unable to calculate"

      - name: рҹӘ„ Upload bin directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin
          compression-level: 9

      - name: вҢҡ Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "рҹ“Ӯ Firmware files:"
          ls -lh
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: рҹ“ў Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          compression-level: 9

      - name: рҹ“Ң Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          RELEASE_TAG=$(date +"%Y.%m.%d-%H%M")
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          # з”ҹжҲҗ release дҝЎжҒҜ
          cat > release.txt << EOF
          ## рҹ“Ұ OpenWrt Firmware Release

          **рҹҸ·пёҸ Release:** $RELEASE_TAG
          **рҹҢҝ Branch:** $REPO_BRANCH
          **рҹ“ұ Device:** $(cat openwrt/DEVICE_NAME 2>/dev/null || echo 'N/A')
          **рҹ“… Build Date:** $(date +"%Y-%m-%d %H:%M:%S")
          **рҹ”Ё Compiler:** GCC with ccache

          ## рҹ“Ҙ Download

          Download the firmware files from the assets below.

          ---

          Built with вқӨпёҸ using [GitHub Actions](https://github.com/features/actions)
          EOF

          echo "status=success" >> $GITHUB_OUTPUT

      - name: рҹ“Ө Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*sysupgrade.bin
      - name: рҹҡ§ Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: рҹ—‘пёҸ Remove old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
